name: Sync Tour Dates

on:
  schedule:
    - cron: '0 4 * * *' # Chaque nuit à 4h UTC (6h heure de Paris en été)
  workflow_dispatch: # Déclenchement manuel toujours possible

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client requests

      - name: Run sync script
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
        run: python sync_calendar.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dates.json
          git commit -m "Auto-update tour dates from Google Calendar" || exit 0
          git push
